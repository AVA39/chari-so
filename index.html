<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>チャリ走</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#111; display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
    canvas { display:block; max-width:100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(window.innerWidth, 800);
const H = Math.min(window.innerHeight, 450);
canvas.width = W;
canvas.height = H;

// ── 定数 ──────────────────────────────────────
const GRAV    = 0.55;
const JUMP_V  = -12;
const BASE_SPD = 5;
const MAX_SPD  = 15;
const WR       = 12;        // ホイール半径
const GY       = H * 0.70;  // デフォルト地面Y
const BSX      = W * 0.27;  // バイクの固定スクリーンX

// ── ゲームステート ────────────────────────────
const GS = { MENU:0, PLAY:1, DEAD:2 };
let gs = GS.MENU;
let frameN = 0, deadTimer = 0;
let best = +localStorage.getItem('chariRun4') || 0;
let camX = 0, menuCamX = 0;

// ── バイク ────────────────────────────────────
let b = {};
function mkBike() {
  return { wx:200, y:GY-WR, vy:0, onGnd:true, jumps:2, angle:0, wRot:0, spd:BASE_SPD };
}

// ── 地形 ─────────────────────────────────────
// segs: [{x1, x2, y}]  x1/x2=ワールドX, y=地面スクリーンY
let segs = [], nxtX = 0;

function genTerrain(upTo, diff) {
  while (nxtX < upTo) {
    if (nxtX === 0) {
      segs.push({ x1:-400, x2:550, y:GY });
      nxtX = 550;
    } else {
      const gap = 55 + Math.random() * 70 * Math.min(diff * 1.3, 3.2);
      nxtX += gap;
      const pw = 110 + Math.random() * 190;
      const yOff = Math.random() < 0.35 ? (Math.random()-0.5)*60 : 0;
      const py = Math.max(GY-90, Math.min(GY+20, GY+yOff));
      segs.push({ x1:nxtX, x2:nxtX+pw, y:py });
      nxtX += pw;
    }
  }
}

function groundAt(wx) {
  for (let i = segs.length-1; i >= 0; i--)
    if (wx >= segs[i].x1-1 && wx <= segs[i].x2+1) return segs[i].y;
  return null;
}

// ── パーティクル ─────────────────────────────
let parts = [];
function emit(wx, y, vx, vy, life, color, size) {
  parts.push({ wx, y, vx, vy, life, max:life, color, size });
}
function dust(wx, y) {
  for (let i=0; i<7; i++)
    emit(wx, y, (Math.random()-0.6)*4, -Math.random()*2.5-0.5, 22, '#A1887F', 2.5);
}
function boom(wx, y) {
  const cols = ['#FF5722','#FF9800','#795548','#9E9E9E','#FFF9C4'];
  for (let i=0; i<30; i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*7+1;
    emit(wx, y, Math.cos(a)*s, Math.sin(a)*s-3, 70, cols[i%5], Math.random()*5+2);
  }
}
function tickParts() {
  for (const p of parts) { p.wx+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life--; }
  parts = parts.filter(p => p.life > 0);
}

// ── 入力 ─────────────────────────────────────
function onJump() {
  if (gs === GS.MENU) { startGame(); return; }
  if (gs === GS.DEAD && deadTimer > 1500) { gs = GS.MENU; return; }
  if (gs !== GS.PLAY) return;
  if (b.jumps > 0) {
    b.vy = JUMP_V;
    b.jumps--;
    b.onGnd = false;
    dust(b.wx, b.y + WR);
  }
}
document.addEventListener('keydown', e => {
  if ((e.code==='Space'||e.code==='ArrowUp') && !e.repeat) { e.preventDefault(); onJump(); }
});
canvas.addEventListener('touchstart', e => { e.preventDefault(); onJump(); }, {passive:false});
canvas.addEventListener('mousedown', onJump);

// ── ゲームフロー ─────────────────────────────
function startGame() {
  b = mkBike();
  segs = []; nxtX = 0; parts = [];
  frameN = 0; deadTimer = 0;
  genTerrain(b.wx + W + 800, 0);
  camX = b.wx - BSX;
  gs = GS.PLAY;
}
function die() {
  if (gs !== GS.PLAY) return;
  boom(b.wx, b.y);
  const sc = score();
  if (sc > best) { best = sc; localStorage.setItem('chariRun4', best); }
  gs = GS.DEAD; deadTimer = 0;
}
function score() { return Math.floor(b.wx / 10); }

// ── 物理 ─────────────────────────────────────
function tick() {
  frameN++;
  b.spd = Math.min(MAX_SPD, BASE_SPD + frameN * 0.0025);

  b.wx += b.spd;
  camX  = b.wx - BSX;

  b.vy += GRAV;
  b.y  += b.vy;

  const gnd = groundAt(b.wx);
  const cY  = gnd !== null ? gnd - WR : null;

  if (cY !== null && b.y >= cY) {
    if (!b.onGnd && b.vy > 3) dust(b.wx, gnd);
    b.y = cY; b.vy = 0; b.onGnd = true; b.jumps = 2;
  } else {
    if (b.onGnd && gnd === null) b.onGnd = false;
  }

  if (b.y > GY + 110) die();

  const tA = b.onGnd ? 0 : Math.min(0.5, Math.max(-0.5, b.vy * 0.032));
  b.angle += (tA - b.angle) * 0.12;
  b.wRot  += b.spd * 0.065;

  genTerrain(b.wx + W + 800, b.wx / 2000);
  segs = segs.filter(s => s.x2 > camX - 300);
  tickParts();
}

// ── 描画ユーティリティ ────────────────────────
function sx(wx) { return wx - camX; }

function pill(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── 描画 ─────────────────────────────────────
function drawBG() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#4FC3F7'); g.addColorStop(0.65,'#B3E5FC'); g.addColorStop(1,'#C8E6C9');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // 太陽
  const sg = ctx.createRadialGradient(W*.85,H*.1,2,W*.85,H*.1,28);
  sg.addColorStop(0,'rgba(255,255,200,1)'); sg.addColorStop(1,'rgba(255,220,80,0)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(W*.85,H*.1,28,0,Math.PI*2); ctx.fill();

  // 雲（パララックス）
  for (const [bx,by,sc] of [[.1,.08,.9],[.42,.06,.75],[.73,.1,.85]]) {
    const cx = ((bx*W - camX*.06) % W + W) % W;
    drawCloud(cx, by*H, sc);
  }

  // 遠景の丘
  ctx.fillStyle='#A5D6A7';
  ctx.beginPath(); ctx.moveTo(0,H);
  for (let x=0; x<=W; x+=4) {
    const hy = GY+20 + Math.sin((x+camX*.2)*.004)*22 + Math.sin((x+camX*.2)*.009)*10;
    ctx.lineTo(x,hy);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}

function drawCloud(x,y,s) {
  ctx.fillStyle='rgba(255,255,255,0.82)';
  for (const [dx,dy,r] of [[0,0,18],[16,-4,14],[32,0,16],[48,-2,12]]) {
    ctx.beginPath(); ctx.arc(x+dx*s,y+dy*s,r*s,0,Math.PI*2); ctx.fill();
  }
}

function drawSegs() {
  for (const seg of segs) {
    const x1=sx(seg.x1), x2=sx(seg.x2);
    if (x2<-5||x1>W+5) continue;
    const h = H - seg.y + 10;
    const gr = ctx.createLinearGradient(0,seg.y,0,H);
    gr.addColorStop(0,'#6D4C41'); gr.addColorStop(.4,'#5D4037'); gr.addColorStop(1,'#3E2723');
    ctx.fillStyle=gr; ctx.fillRect(x1,seg.y,x2-x1,h);
    ctx.fillStyle='#4CAF50'; ctx.fillRect(x1,seg.y,x2-x1,6);
    ctx.fillStyle='#76C442'; ctx.fillRect(x1,seg.y,x2-x1,2);
    if (x1>-5) { ctx.fillStyle='#4E342E'; ctx.fillRect(x1-3,seg.y+5,4,H-seg.y); }
  }
}

function drawParts() {
  ctx.save();
  for (const p of parts) {
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(sx(p.wx),p.y,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawBike() {
  ctx.save();
  ctx.translate(BSX, b.y);
  ctx.rotate(b.angle);
  const hb=20;

  // 地面影
  const gnd = groundAt(b.wx);
  if (gnd!==null) {
    const dist = Math.max(0, gnd - b.y - WR);
    ctx.save(); ctx.rotate(-b.angle);
    ctx.fillStyle=`rgba(0,0,0,${Math.max(0,.25-dist*.0008)})`;
    const ss=Math.max(.35,1-dist*.003);
    ctx.beginPath(); ctx.ellipse(0,dist+WR+3,26*ss,5*ss,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  drawWheel(-hb); drawWheel(hb);

  ctx.strokeStyle='#FF5722'; ctx.lineWidth=2.5; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(-hb,0); ctx.lineTo(2,-14);
  ctx.moveTo(-hb,0); ctx.lineTo(-5,-20);
  ctx.moveTo(2,-14);  ctx.lineTo(hb,0);
  ctx.moveTo(-5,-20); ctx.lineTo(hb-2,-14);
  ctx.moveTo(-2,-10); ctx.lineTo(-5,-20);
  ctx.stroke();

  ctx.fillStyle='#212121'; ctx.fillRect(-13,-23,13,3);
  ctx.strokeStyle='#FF8A65'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(hb-2,-14); ctx.lineTo(hb,0); ctx.stroke();
  ctx.strokeStyle='#212121';
  ctx.beginPath(); ctx.moveTo(hb-4,-14); ctx.lineTo(hb+5,-12); ctx.stroke();

  drawRider();
  ctx.restore();
}

function drawWheel(ox) {
  ctx.strokeStyle='#1A1A1A'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(ox,0,WR,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#757575'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(ox,0,WR-3,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#9E9E9E'; ctx.lineWidth=1;
  for (let i=0;i<6;i++) {
    const a=b.wRot+i/6*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(ox,0); ctx.lineTo(ox+Math.cos(a)*(WR-2),Math.sin(a)*(WR-2)); ctx.stroke();
  }
  ctx.fillStyle='#BDBDBD'; ctx.beginPath(); ctx.arc(ox,0,3,0,Math.PI*2); ctx.fill();
}

function drawRider() {
  const lean=-0.2-(b.spd/MAX_SPD)*.18;
  ctx.save(); ctx.translate(-3,-20); ctx.rotate(lean);

  ctx.strokeStyle='#1565C0'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(4,-14); ctx.stroke();

  ctx.beginPath(); ctx.arc(5,-19,5.5,0,Math.PI*2);
  ctx.fillStyle='#FFCC80'; ctx.fill();
  ctx.strokeStyle='#5D4037'; ctx.lineWidth=1; ctx.stroke();

  ctx.beginPath(); ctx.arc(5,-20,6,Math.PI,0);
  ctx.fillStyle='#E53935'; ctx.fill();

  ctx.strokeStyle='#1565C0'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(3,-10); ctx.quadraticCurveTo(12,-8,22,-10); ctx.stroke();

  const ca=b.wRot*1.4;
  ctx.strokeStyle='#2E7D32'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.sin(ca)*7+1,Math.cos(ca)*7+2); ctx.lineTo(3,9); ctx.stroke();
  ctx.strokeStyle='#388E3C';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.sin(ca+Math.PI)*7+1,Math.cos(ca+Math.PI)*7+2); ctx.lineTo(3,9); ctx.stroke();

  ctx.restore();
}

function drawHUD() {
  const sc = score();
  ctx.fillStyle='rgba(0,0,0,.45)'; pill(10,10,155,55,8); ctx.fill();
  ctx.fillStyle='#FFF'; ctx.font='bold 22px monospace'; ctx.fillText(`${sc}m`,20,36);
  ctx.fillStyle='#FFD54F'; ctx.font='12px monospace'; ctx.fillText(`BEST:${best}m`,20,54);

  const bw=90, r=Math.min(1,Math.max(0,(b.spd-BASE_SPD)/(MAX_SPD-BASE_SPD)));
  ctx.fillStyle='rgba(0,0,0,.4)'; pill(10,72,bw,9,4); ctx.fill();
  if (r>0) { ctx.fillStyle=r>.7?'#EF5350':'#FFA726'; pill(10,72,bw*r,9,4); ctx.fill(); }
  ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font='9px monospace'; ctx.fillText('SPEED',10,93);

  // ジャンプ残量
  for (let i=0;i<2;i++) {
    ctx.fillStyle = i<b.jumps ? '#64B5F6' : 'rgba(255,255,255,.2)';
    ctx.beginPath(); ctx.arc(16+i*20,107,7,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,.55)'; ctx.font='9px sans-serif'; ctx.fillText('JUMP',10,124);

  if ('ontouchstart' in window) {
    ctx.fillStyle='rgba(255,255,255,.1)';
    ctx.beginPath(); ctx.arc(W/2,H-55,44,0,Math.PI*2); ctx.fill();
    ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,.45)'; ctx.font='28px sans-serif'; ctx.fillText('↑ JUMP',W/2,H-42);
    ctx.textAlign='left';
  }
}

function drawSpeedLines() {
  if (b.spd < MAX_SPD*.65) return;
  const a=(b.spd-MAX_SPD*.65)/(MAX_SPD*.35)*.28;
  ctx.save(); ctx.strokeStyle=`rgba(255,255,255,${a})`; ctx.lineWidth=1.5;
  for (let i=0;i<7;i++) {
    const y=H*.12+i*(H*.7/7), len=20+Math.random()*55;
    ctx.beginPath(); ctx.moveTo(BSX-18,y); ctx.lineTo(BSX-18-len,y); ctx.stroke();
  }
  ctx.restore();
}

function drawMenu() {
  ctx.fillStyle='rgba(0,0,0,.5)'; pill(W/2-175,H/2-100,350,200,18); ctx.fill();
  ctx.textAlign='center';
  ctx.fillStyle='#FFD54F'; ctx.font='bold 54px sans-serif'; ctx.fillText('チャリ走',W/2,H/2-36);
  ctx.fillStyle='#FFF'; ctx.font='18px sans-serif'; ctx.fillText('タップ / スペース でスタート',W/2,H/2+10);
  ctx.fillStyle='#90CAF9'; ctx.font='14px sans-serif'; ctx.fillText('ジャンプ & ダブルジャンプで穴を越えろ！',W/2,H/2+36);
  if (best>0) { ctx.fillStyle='#FFD54F'; ctx.font='14px monospace'; ctx.fillText(`BEST: ${best}m`,W/2,H/2+66); }
  ctx.textAlign='left';
}

function drawDead() {
  const sc = score();
  ctx.fillStyle='rgba(0,0,0,.55)'; pill(W/2-155,H/2-90,310,180,16); ctx.fill();
  ctx.textAlign='center';
  ctx.fillStyle='#EF5350'; ctx.font='bold 34px sans-serif'; ctx.fillText('クラッシュ！',W/2,H/2-34);
  ctx.fillStyle='#FFF'; ctx.font='bold 30px monospace'; ctx.fillText(`${sc}m`,W/2,H/2+8);
  if (sc>=best) { ctx.fillStyle='#FFD700'; ctx.font='bold 16px sans-serif'; ctx.fillText('🏆 NEW BEST!',W/2,H/2+34); }
  else { ctx.fillStyle='#B0BEC5'; ctx.font='14px monospace'; ctx.fillText(`BEST: ${best}m`,W/2,H/2+34); }
  if (deadTimer>1500) { ctx.fillStyle='#FFF'; ctx.font='18px sans-serif'; ctx.fillText('タップ / スペース でリスタート',W/2,H/2+66); }
  ctx.textAlign='left';
}

// ── メインループ ──────────────────────────────
let lastT = 0;

function loop(t) {
  requestAnimationFrame(loop);
  const dt = Math.min(t - lastT, 40);
  lastT = t;

  if (gs===GS.PLAY) {
    const steps = Math.ceil(dt/16.67);
    for (let i=0;i<steps;i++) tick();
  } else if (gs===GS.DEAD) {
    deadTimer += dt; tickParts();
  } else {
    menuCamX += 1.5; camX = menuCamX;
    genTerrain(menuCamX + W + 800, 0);
    segs = segs.filter(s => s.x2 > camX - 300);
    tickParts();
  }

  ctx.clearRect(0,0,W,H);
  drawBG();
  drawSegs();
  drawParts();

  if (gs===GS.PLAY)       { drawSpeedLines(); drawBike(); drawHUD(); }
  else if (gs===GS.DEAD)  { drawDead(); }
  else                    { drawMenu(); }
}

// 初期地形生成（メニュー背景用）
genTerrain(W + 800, 0);
requestAnimationFrame(loop);
</script>
</body>
</html>
